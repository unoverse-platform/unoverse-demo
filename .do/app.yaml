# DigitalOcean App Platform spec — deploys this repo as a STATIC SITE.
#
# Why static (not a service): `npm run build` emits a plain SPA (index.html + hashed assets
# in dist/). There's no Node process to run — so a "Web Service" component fails with
# "no default process type". A Static Site serves dist/ directly.
#
# `catchall_document: index.html` is REQUIRED: /sab and /bpp are client-side path routes,
# so every unknown path must fall back to index.html or it 404s on the deployed host.
#
# Apply it:  doctl apps update <APP_ID> --spec .do/app.yaml
#     (new)  doctl apps create --spec .do/app.yaml
name: unoverse-demo
region: lon   # change to your region (nyc, ams, sfo, fra, sgp, blr, syd…)
static_sites:
  - name: web
    github:
      repo: unoverse-platform/unoverse-demo
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html   # SPA fallback → /sab, /bpp resolve
    # VITE_* are inlined into the bundle at BUILD time (they end up in the shipped JS, so
    # they are not secret). VITE_UNOVERSE_URL MUST point at a publicly reachable Unoverse
    # server — with localhost the drawer will always show "app failed to load".
    envs:
      - key: VITE_UNOVERSE_URL
        scope: BUILD_TIME
        value: https://REPLACE-with-your-unoverse-server   # e.g. https://unoverse-server.example.com
      - key: VITE_AUTH_ISSUER
        scope: BUILD_TIME
        value: https://gravityai.eu.auth0.com
      - key: VITE_AUTH_CLIENT_ID
        scope: BUILD_TIME
        value: Yq7CH3YmEOEtIM8zY2pBMDehFm5kVVma
      - key: VITE_AUTH_AUDIENCE
        scope: BUILD_TIME
        value: gravity-api
