<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unoverse Demo</title>
    <style>
      /* box-sizing only — do NOT reset margin/padding on `*` here: this <style> is
         UNLAYERED, so it would override Tailwind's `@layer utilities` (p-8, mb-8, py-3…)
         and strip all component spacing. Reset margin on body alone. */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
      }
      html,
      body {
        width: 100%;
        min-height: 100%;
      }
      /* The "fake" host page — a full-width screenshot of the client's site that
         the chat launcher floats over (swapped by the client switcher). */
      .bg-container {
        width: 100%;
      }
      .bg-container img {
        width: 100%;
        height: auto;
        display: block;
      }
      /* The widget self-mounts into #unoverse-demo. Make it a fixed, click-through
         overlay so only the floating button + sliding chat panel are interactive;
         the fake page shows through behind. In production this whole file is
         replaced by a single <script src="unoverse-demo.js"> on the real host page. */
      #unoverse-demo {
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: none;
      }
      #unoverse-demo > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <!-- The fake host page behind the drawer. Left empty on purpose: the landing page (`/`)
         shows nothing here, and each channel route (`/sab`, `/bpp`) sets this src to its own
         screenshot. In production this whole file is replaced by the real host page. -->
    <div class="bg-container">
      <img alt="Client background" />
    </div>

    <!-- Pre-created host so the self-mounting widget renders into this overlay
         (main.jsx reuses an existing #unoverse-demo if present). -->
    <div id="unoverse-demo"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
